    <title>Voleybol Day Pro | Canlı Veri Portalı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-primary: #6366f1;
            --brand-secondary: #f43f5e;
            --brand-dark: #1e1b4b;
            color-scheme: light;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }

        .match-card { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 1.5rem; 
        }
        
        .match-card:hover { 
            transform: scale(1.002);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.05);
            border-color: #e0e7ff;
        }

        .sticky-header { 
            position: sticky; 
            top: 0; 
            z-index: 50; 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .drag-scroll { cursor: grab; }
        .drag-scroll:active { cursor: grabbing; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }

        .status-btn.active {
            background-color: white;
            color: var(--brand-primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .team-logo-circle {
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            background: white;
        }

        .team-logo-circle img {
            width: 100%; height: 100%;
            object-fit: contain;
            padding: 2px;
            z-index: 2;
        }

        .fallback-text {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 9px; color: #94a3b8;
            text-transform: uppercase; background: #f8fafc;
            border-radius: 50%;
        }

        .modal-overlay { 
            display: none; position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.8); z-index: 100; 
            align-items: center; justify-content: center; padding: 1rem;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white; border-radius: 2rem; padding: 1.5rem;
            width: 100%; max-width: 500px; position: relative;
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes glow-pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
        .today-active-tab {
            animation: glow-pulse 2s infinite;
            transform: translateY(-2px);
            z-index: 10;
        }
    </style>
</head>
<body class="antialiased text-slate-900">

<!-- YÜKLENİYOR EKRANI -->
<div id="loading-overlay" class="fixed inset-0 bg-slate-50 z-[100] flex flex-col items-center justify-center gap-6 transition-opacity duration-300">
    <div class="relative w-20 h-20">
        <div class="absolute inset-0 border-4 border-indigo-100 rounded-full"></div>
        <div class="absolute inset-0 border-4 border-indigo-600 rounded-full border-t-transparent animate-spin"></div>
        <i class="fas fa-volleyball-ball absolute inset-0 flex items-center justify-center text-indigo-600 text-2xl animate-bounce"></i>
    </div>
    <div class="text-center">
        <h2 class="text-xl font-black text-slate-800 tracking-tighter uppercase">Voleybol Day Pro</h2>
        <p class="text-xs text-slate-500 font-medium">Veriler Hazırlanıyor...</p>
    </div>
</div>

<div id="app" class="max-w-[1600px] mx-auto min-h-screen pb-20">
    <!-- HEADER -->
    <header class="bg-indigo-950 text-white pt-10 pb-32 px-4 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-indigo-500 rounded-full opacity-10 blur-[130px] -mr-48 -mt-48 pointer-events-none"></div>
        <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-8 container mx-auto">
            <div class="text-center md:text-left">
                <h1 class="text-3xl md:text-5xl font-black tracking-tighter text-white">Voleybol <span class="text-indigo-400">Day</span> Pro</h1>
                <p class="text-indigo-200/70 font-medium text-[10px] md:text-sm tracking-wide">Takım odaklı canlı veri ve paylaşım portalı.</p>
            </div>
            
            <div class="flex flex-wrap items-center justify-center gap-3">
                <!-- Saat -->
                <div class="bg-white/5 backdrop-blur-xl h-12 px-4 rounded-2xl border border-white/10 flex items-center gap-3 shadow-xl">
                    <i class="far fa-clock text-indigo-300"></i>
                    <div class="flex flex-col leading-none">
                        <span id="live-time" class="text-lg font-black tracking-tighter">--:--</span>
                        <span id="live-date" class="text-[9px] uppercase font-bold text-indigo-300 tracking-widest">...</span>
                    </div>
                </div>
                <!-- Toplam Maç -->
                <div class="bg-white/5 backdrop-blur-xl h-12 px-4 rounded-2xl border border-white/10 text-center flex flex-col justify-center shadow-xl">
                    <span class="text-[9px] uppercase font-bold text-indigo-300 tracking-widest mb-0.5 leading-none">Maçlar</span>
                    <span id="match-count-badge" class="text-xl font-black leading-none">0</span>
                </div>
                <!-- Yenile -->
                <button onclick="fetchData()" class="bg-white text-indigo-950 w-12 h-12 rounded-2xl flex items-center justify-center hover:bg-indigo-50 active:scale-95 shadow-xl shrink-0">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <!-- KAHVE BUTONU -->
                <div class="flex items-center justify-center scale-[0.85] sm:scale-100 origin-center shrink-0">
                    <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="bedenegitimi" data-color="#5F7FFF" data-emoji="☕"  data-font="Cookie" data-text="Bana bir kahve ısmarla" data-outline-color="#000000" data-font-color="#ffffff" data-coffee-color="#FFDD00" ></script>
                </div>
            </div>
        </div>
    </header>

    <div class="-mt-16 px-4 container mx-auto">
        <div class="relative max-w-6xl mx-auto">
            
            <!-- SEÇİLİ TAKIM PANELİ (5 Kolonlu) -->
            <div id="selected-team-display" class="hidden absolute left-1/2 -translate-x-1/2 -top-[3.5rem] z-[60] flex flex-col items-center w-full max-w-[98%] sm:max-w-2xl px-2">
                <div onclick="clearSelectedTeam()" class="bg-indigo-900/90 backdrop-blur-xl border border-indigo-400/30 p-2 sm:p-2.5 rounded-full shadow-2xl flex items-center w-full cursor-pointer hover:scale-[1.01] transition-all overflow-hidden">
                    <div id="selected-team-logo" class="flex items-center justify-center bg-white rounded-full p-0.5 shadow-inner shrink-0 ml-1"></div>
                    <div id="selected-team-stats" class="flex-1 flex items-center justify-around px-2 sm:px-4 text-white font-black text-center text-xs sm:text-sm"></div>
                </div>
            </div>

            <!-- KONTROL MERKEZİ -->
            <div class="sticky-header bg-white/95 shadow-2xl rounded-[3rem] p-4 md:p-8 border border-white flex flex-col gap-5">
                
                <!-- ÜST TAKIM LOGOLARI -->
                <div id="top-logos-wrapper" class="w-full transition-all duration-300">
                    <div id="top-logos-container" class="drag-scroll flex gap-3 overflow-x-auto no-scrollbar pb-2 select-none items-center"></div>
                </div>

                <!-- Bölge Sekmeleri -->
                <div id="region-tabs" class="drag-scroll flex gap-2.5 overflow-x-auto no-scrollbar pb-1 select-none">
                    <button id="btn-reg-istanbul" onclick="setRegion('istanbul')" class="region-btn px-6 py-2.5 rounded-xl text-[10px] font-black uppercase border transition-all shrink-0">
                        <i class="fas fa-map-marker-alt mr-2"></i> TVF İSTANBUL
                    </button>
                    <button id="btn-reg-kocaeli" onclick="setRegion('kocaeli')" class="region-btn px-6 py-2.5 rounded-xl text-[10px] font-black uppercase border transition-all shrink-0">
                        <i class="fas fa-map-marker-alt mr-2"></i> TVF KOCAELİ
                    </button>
                </div>

                <div class="flex flex-col lg:flex-row items-stretch gap-4">
                    <div id="status-tabs" class="flex items-center bg-slate-100 p-1.5 rounded-xl no-scrollbar overflow-x-auto shrink-0 select-none">
                        <button onclick="setStatusFilter('all')" id="filter-all" class="status-btn active px-5 py-2.5 rounded-lg text-[10px] font-black uppercase whitespace-nowrap">Hepsi</button>
                        <button onclick="setStatusFilter('played')" id="filter-played" class="status-btn px-5 py-2.5 rounded-lg text-[10px] font-black uppercase text-slate-500 whitespace-nowrap">Bitenler</button>
                        <button onclick="setStatusFilter('pending')" id="filter-pending" class="status-btn px-5 py-2.5 rounded-lg text-[10px] font-black uppercase text-slate-500 whitespace-nowrap">Gelecek</button>
                        <button onclick="setStatusFilter('delayed')" id="filter-delayed" class="status-btn px-5 py-2.5 rounded-lg text-[10px] font-black uppercase text-slate-500 whitespace-nowrap">Ertelenen</button>
                    </div>
                    <div id="daily-quote-container" class="flex-1 flex items-center justify-center bg-indigo-50/50 border border-indigo-100 rounded-xl py-2.5 px-6 select-none">
                        <p class="text-[11px] font-semibold text-indigo-900 text-center italic leading-tight">
                            <i class="fas fa-quote-left text-indigo-300 mr-2 opacity-50"></i>
                            <span id="daily-quote-text"></span>
                            <i class="fas fa-quote-right text-indigo-300 ml-2 opacity-50"></i>
                        </p>
                    </div>
                </div>

                <div class="relative w-full text-slate-900">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="team-search" oninput="handleSearch(this.value)" placeholder="Takım veya lig ara..." 
                           class="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-100 focus:bg-white rounded-xl py-3 pl-12 pr-6 text-xs sm:text-sm font-semibold outline-none transition-all">
                </div>

                <div id="date-tabs-wrapper" class="border-t border-slate-100 pt-4">
                    <div id="date-tabs" class="drag-scroll flex gap-2.5 overflow-x-auto no-scrollbar pb-1 select-none"></div>
                </div>

                <div id="playing-teams-wrapper" class="border-t border-slate-100 pt-4 hidden text-slate-900">
                    <div class="flex items-center justify-between mb-2 px-1">
                        <h3 class="text-[9px] font-black text-slate-400 uppercase tracking-widest flex items-center"><i class="fas fa-users mr-2"></i> Sistemdeki Takımlar <span id="total-team-count" class="bg-slate-100 px-1.5 py-0.5 rounded ml-2">0</span></h3>
                    </div>
                    <div id="alphabet-index" class="drag-scroll flex gap-1.5 overflow-x-auto no-scrollbar pb-2 mb-2 border-b border-slate-50 px-1 select-none"></div>
                    <div id="playing-teams" class="flex flex-wrap gap-2 max-h-[140px] overflow-y-auto px-1 custom-scrollbar select-none"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MAÇ LİSTESİ -->
    <main id="match-container" class="mt-8 px-4 container mx-auto flex flex-col gap-4 max-w-6xl mx-auto"></main>
    
    <div id="empty-state" class="hidden flex-col items-center justify-center py-20 text-slate-300 text-center">
        <i class="fas fa-volleyball-ball text-6xl mb-4 opacity-10"></i>
        <p class="font-bold text-lg tracking-tight text-slate-400 text-center">Eşleşen maç bulunamadı.</p>
    </div>
</div>

<!-- DETAYLI WHATSAPP MODAL -->
<div id="whatsapp-modal" class="modal-overlay text-slate-900">
    <div class="modal-content shadow-2xl max-h-[90vh] overflow-y-auto custom-scrollbar">
        <button onclick="closeWhatsappModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
        <div class="mb-4 text-center border-b pb-3">
            <h3 class="text-lg font-black text-indigo-950 uppercase tracking-tighter">WHATSAPP'TA PAYLAŞ</h3>
            <p class="text-[9px] text-slate-400 font-bold uppercase mt-1">Maç Bilgilerini Gönder</p>
        </div>
        <div id="whatsapp-modal-match-info" class="flex items-center justify-between gap-4 p-4 bg-slate-50/80 rounded-2xl border border-slate-100 mb-4"></div>
        <textarea id="whatsapp-note" rows="2" placeholder="Not ekleyin..." class="w-full bg-white border-2 border-slate-100 focus:border-indigo-100 rounded-xl p-3 text-sm font-semibold outline-none resize-none mb-3 transition-all"></textarea>
        
        <div id="whatsapp-roster-section" class="hidden flex-col gap-2.5 border-t border-slate-100 pt-4">
            <h4 class="text-[10px] font-black text-indigo-600 uppercase tracking-widest flex items-center gap-1.5"><i class="fas fa-clipboard-list mr-1"></i> MAÇ KADROSU (İSTEĞE BAĞLI)</h4>
            <input type="text" id="coach-name" placeholder="Antrenör Adı" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-sm font-semibold outline-none">
            <div class="flex gap-2">
                <input type="time" id="meeting-time" class="w-1/3 bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-sm font-semibold text-slate-600">
                <input type="text" id="meeting-location" placeholder="Toplanma Yeri" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-sm font-semibold">
            </div>
            <select id="team-serve-status" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-sm font-semibold text-slate-600 cursor-pointer">
                <option value="">Servis Durumu</option>
                <option value="Var ✅">Servis: Var ✅</option>
                <option value="Yok ❌">Servis: Yok ❌</option>
            </select>
            <div id="players-list" class="flex flex-col gap-1.5 max-h-[220px] overflow-y-auto custom-scrollbar pr-1 mt-1"></div>
        </div>
        <button id="whatsapp-send-btn" class="w-full bg-green-500 hover:bg-green-600 text-white py-3.5 rounded-xl font-black uppercase tracking-widest flex items-center justify-center gap-3 mt-4 shadow-lg shadow-green-100 transition-all">
            <i class="fab fa-whatsapp text-2xl"></i> PAYLAŞ
        </button>
    </div>
</div>

    // --- UTILS ---
    function normalize(s) { if (!s) return ""; return s.toString().trim().toLocaleLowerCase('tr-TR').replace(/\s+/g, '').replace(/[\.\,\-\(\)]/g, ''); }
    function cleanTeamName(s) { return s ? s.toString().replace(/^\(H\)\s*[-–—]?\s*/i, '').trim() : ""; }
    function getCoreName(s) { let n = cleanTeamName(s); return n.replace(/\s+[A-E]$/i, '').trim(); }
    function getTurkeyTime() { const now = new Date(); return new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (10800000)); }
    function getTodayString() { const tr = getTurkeyTime(); return `${String(tr.getDate()).padStart(2, '0')}.${String(tr.getMonth() + 1).padStart(2, '0')}.${tr.getFullYear()}`; }
    function isMatchPlayed(m) { return (m.s1 !== '-' && m.s1 !== '') || (m.s2 !== '-' && m.s2 !== ''); }
    function timeToMins(t) { const p = (t || "00:00").split(':'); return (parseInt(p[0]) || 0) * 60 + (parseInt(p[1]) || 0); }
    function dateToValue(d) { if(!d) return 0; const p = d.split('.').map(Number); return new Date(p[2], p[1]-1, p[0]).getTime(); }

    function isMatchDelayedOrMissing(m) {
        if (isMatchPlayed(m)) return false;
        const todayVal = dateToValue(getTodayString()), mVal = dateToValue(m.date);
        if (mVal < todayVal) return true;
        if (mVal === todayVal) {
            if (getTurkeyTime().getHours() * 60 + getTurkeyTime().getMinutes() >= timeToMins(m.time) + 120) return true;
        }
        return false;
    }

    function checkLiveStatus(m) {
        if (isMatchPlayed(m) || isMatchDelayedOrMissing(m)) return false;
        if (m.date === getTodayString()) {
            if (getTurkeyTime().getHours() * 60 + getTurkeyTime().getMinutes() >= timeToMins(m.time)) return true;
        }
        return false;
    }

    // --- ACTIONS ---
    function startLiveClock() {
        const tEl = document.getElementById('live-time'), dEl = document.getElementById('live-date');
        function update() {
            const tr = getTurkeyTime();
            if(tEl) tEl.innerText = `${String(tr.getHours()).padStart(2, '0')}:${String(tr.getMinutes()).padStart(2, '0')}`;
            const days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            const months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
            if(dEl) dEl.innerText = `${tr.getDate()} ${months[tr.getMonth()]} ${days[tr.getDay()]}`;
        }
        update(); setInterval(update, 30000);
    }

    function setDailyQuote() {
        const tr = getTurkeyTime();
        const dayOfYear = Math.floor((tr - new Date(tr.getFullYear(), 0, 0)) / 86400000);
        const qt = document.getElementById('daily-quote-text');
        if (qt) qt.innerText = MOTIVATION_QUOTES[dayOfYear % MOTIVATION_QUOTES.length];
    }

    function setRegion(regionKey) {
        if (!REGIONS[regionKey]) return;
        state.selectedRegion = regionKey; state.selectedTeam = null; state.currentDate = ""; state.searchQuery = ""; state.selectedAlphabet = null;
        document.querySelectorAll('.region-btn').forEach(btn => btn.className = "region-btn px-6 py-3 rounded-2xl text-[11px] font-black uppercase border border-slate-200 bg-white text-slate-500 hover:border-indigo-300 transition-all shrink-0 shadow-sm");
        const activeBtn = document.getElementById(`btn-reg-${regionKey}`);
        if(activeBtn) activeBtn.className = "region-btn px-6 py-3 rounded-2xl text-[11px] font-black uppercase border border-indigo-600 bg-indigo-600 text-white shadow-md transition-all shrink-0 shadow-sm";
        if(document.getElementById('team-search')) document.getElementById('team-search').value = "";
        fetchData();
    }

    async function fetchData() {
        try {
            document.getElementById('loading-overlay').classList.remove('hidden');
            const region = REGIONS[state.selectedRegion];
            const ts = Date.now();
            const response = await fetch(`${region.matches}${region.matches.includes('?') ? '&' : '?'}cb=${ts}`);
            const csv = await response.text();
            state.allMatches = parseMatches(csv);
            const dates = getSortedDates(), today = getTodayString();
            if (dates.length > 0) state.currentDate = dates.includes(today) ? today : dates[0];
            document.getElementById('loading-overlay').classList.add('hidden');
            updateUI();
        } catch (error) { 
            document.getElementById('loading-overlay').classList.add('hidden');
            showError("Veriler güncellenemedi.");
        }
    }

    function parseMatches(csv) {
        const lines = csv.split(/\r?\n/).filter(l => l.trim());
        return lines.slice(1).map(line => {
            const p = parseCSVLine(line);
            return {
                date: (p[0] || "").trim(), venue: (p[1] || "").trim(), time: (p[2] || "").trim(), 
                t1: cleanTeamName(p[3]), s1: (p[4] || "").trim() || "-", s2: (p[5] || "").trim() || "-", 
                t2: cleanTeamName(p[6]), sets: (p[7] || "").trim(),
                league: (p[10] || "LİG").trim(), kume: (p[10] || ""), tur: (p[12] || ""), gr: (p[13] || ""), c: (p[9] || ""), ktg: (p[11] || "")
            };
        }).filter(m => {
            const lowTime = m.time.toLocaleLowerCase('tr-TR');
            const lowSets = m.sets.toLocaleLowerCase('tr-TR');
            return !lowTime.includes('iptal') && !lowSets.includes('iptal');
        });
    }

    function parseCSVLine(line) {
        const parts = []; let curr = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            if (line[i] === '"') inQuotes = !inQuotes;
            else if (line[i] === ',' && !inQuotes) { parts.push(curr); curr = ''; }
            else curr += line[i];
        }
        parts.push(curr); return parts;
    }

    function getLogoHtml(teamName, classes = "w-9 h-9") {
        const norm = normalize(teamName); let url = null, maxLen = -1;
        for (const k in CONSTANT_LOGOS) { if (norm.includes(normalize(k)) && normalize(k).length > maxLen) { maxLen = normalize(k).length; url = CONSTANT_LOGOS[k]; } }
        const initial = teamName.substring(0, 2).toUpperCase() || "VO";
        return `<div class="team-logo-circle ${classes} border shadow-sm relative overflow-hidden">
            <span class="fallback-text">${initial}</span>
            ${url ? `<img src="${url}" loading="lazy" class="relative z-10" onerror="this.style.display='none'">` : ''}
        </div>`;
    }

            sD.classList.remove('hidden'); sD.classList.add('flex'); dW.classList.add('hidden'); pW.classList.add('hidden');

                <div class="flex flex-col items-center flex-1 px-1 border-r border-indigo-700/50 text-emerald-400"><span class="text-[7px] sm:text-[8px] uppercase font-black opacity-60 mb-0.5">GALİBİYET</span><span class="text-sm sm:text-lg font-black">${s.wins}</span></div>
                <div class="flex flex-col items-center flex-1 px-1 border-r border-indigo-700/50 text-rose-400"><span class="text-[7px] sm:text-[8px] uppercase font-black opacity-60 mb-0.5">MAĞLUBİYET</span><span class="text-sm sm:text-lg font-black">${s.losses}</span></div>
                <div class="hidden sm:flex flex-col items-center flex-1 px-1 border-r border-indigo-700/50 text-amber-400"><span class="text-[7px] sm:text-[8px] uppercase font-black opacity-60 mb-0.5">ERTELENEN</span><span class="text-sm sm:text-lg font-black">${s.delayed}</span></div>
                <div class="flex flex-col items-center flex-1 px-0.5 sm:px-1"><span class="text-[7px] sm:text-[8px] uppercase font-black opacity-60 mb-0.5 text-indigo-300">OYNANACAK</span><span class="text-sm sm:text-lg font-black text-white">${s.pending}</span></div>`;

    function renderTopLogos() {
        const container = document.getElementById('top-logos-container'), wrapper = document.getElementById('top-logos-wrapper');
        if (!state.currentDate) { wrapper.classList.add('hidden'); return; }
        const playingOnDate = new Map();
        state.allMatches.filter(m => m.date === state.currentDate).forEach(m => {
            if(m.t1 && !isPlaceholderTeam(m.t1)) playingOnDate.set(normalize(getCoreName(m.t1)), getCoreName(m.t1));
            if(m.t2 && !isPlaceholderTeam(m.t2)) playingOnDate.set(normalize(getCoreName(m.t2)), getCoreName(m.t2));
        });
        if (playingOnDate.size === 0) { wrapper.classList.add('hidden'); return; }
        wrapper.classList.remove('hidden'); container.innerHTML = '';
        Array.from(playingOnDate.values()).sort((a,b) => a.localeCompare(b, 'tr')).forEach(team => {
            const chip = document.createElement('div');
            const isActive = state.selectedTeam === team;
            chip.className = `flex items-center justify-center p-1 rounded-full border-2 transition-all cursor-pointer shrink-0 ${isActive ? 'border-indigo-600 bg-indigo-50 shadow-md scale-110' : 'border-slate-100 bg-white'}`;
            chip.innerHTML = getLogoHtml(team, "w-9 h-9"); chip.onclick = () => isActive ? clearSelectedTeam() : selectTeam(team);
            container.appendChild(chip);
        });
    }

    function renderDateTabs() {
        const container = document.getElementById('date-tabs'), dates = getSortedDates(), today = getTodayString();
        container.innerHTML = '';
        dates.forEach(date => {
            const isA = date === state.currentDate, isT = date === today;
            const btn = document.createElement('button');
            btn.className = `px-5 py-2.5 rounded-xl text-[10px] font-black uppercase border shrink-0 transition-all ${isA ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg' : 'bg-white text-slate-500 border-slate-100'} ${isT && isA ? 'today-active-tab' : ''}`;
            btn.innerHTML = isT ? `<span class="inline-block w-2 h-2 bg-amber-400 rounded-full animate-pulse mr-2"></span>${date}` : date;
            btn.onclick = () => { state.currentDate = date; updateUI(); };
            container.appendChild(btn);
        });
    }

    function parseSetScoresHtml(sets) {
        let r1 = '', r2 = '', ms = sets ? [...sets.matchAll(/\((\d+)-(\d+)\)/g)] : [];
        for (let i = 0; i < 5; i++) {
            if (i < ms.length) {
                const v1 = parseInt(ms[i][1]), v2 = parseInt(ms[i][2]);
                r1 += `<span class="w-5 sm:w-6 text-center h-8 sm:h-9 flex items-center justify-center ${v1 > v2 ? 'text-rose-600' : 'text-slate-400'}">${v1}</span>`;
                r2 += `<span class="w-5 sm:w-6 text-center h-8 sm:h-9 flex items-center justify-center ${v2 > v1 ? 'text-rose-600' : 'text-slate-400'}">${v2}</span>`;
            } else { 
                r1 += `<span class="w-5 sm:w-6 text-center h-8 sm:h-9 flex items-center justify-center text-slate-200">-</span>`; 
                r2 += `<span class="w-5 sm:w-6 text-center h-8 sm:h-9 flex items-center justify-center text-slate-200">-</span>`; 
            }
        }
        return { row1: `<div class="flex gap-1 sm:gap-1.5 items-center">${r1}</div>`, row2: `<div class="flex gap-1 sm:gap-1.5 items-center">${r2}</div>` };
    }

    function renderMatches() {
        const container = document.getElementById('match-container'); container.innerHTML = '';
        let matches = [];
        if (state.selectedTeam) matches = state.allMatches.filter(m => normalize(m.t1) === normalize(state.selectedTeam) || normalize(m.t2) === normalize(state.selectedTeam));
        else {
            matches = state.allMatches.filter(m => m.date === state.currentDate);
            if (state.selectedStatus === 'played') matches = matches.filter(isMatchPlayed);
            else if (state.selectedStatus === 'pending') matches = matches.filter(m => !isMatchPlayed(m) && !isMatchDelayedOrMissing(m));
            else if (state.selectedStatus === 'delayed') matches = matches.filter(isMatchDelayedOrMissing);
            if (state.searchQuery) {
                const q = normalize(state.searchQuery);
                matches = matches.filter(m => normalize(m.t1).includes(q) || normalize(m.t2).includes(q) || normalize(m.venue).includes(q));
            }
        }
        document.getElementById('match-count-badge').innerText = matches.length;
        if (!matches.length) document.getElementById('empty-state').classList.replace('hidden', 'flex');
        else {
            document.getElementById('empty-state').classList.replace('flex', 'hidden');
            const live = matches.filter(checkLiveStatus), pending = matches.filter(m => !isMatchPlayed(m) && !checkLiveStatus(m) && !isMatchDelayedOrMissing(m)), played = matches.filter(isMatchPlayed), delayed = matches.filter(isMatchDelayedOrMissing);
            const h2Class = "text-indigo-950 font-black text-xl sm:text-2xl tracking-tighter uppercase border-b border-slate-100 pb-3 mb-4";
            if (live.length) { container.insertAdjacentHTML('beforeend', `<h2 class="text-rose-600 font-black text-xl sm:text-2xl tracking-tighter uppercase border-b border-rose-100 pb-3 mb-4">CANLI MAÇLAR</h2>`); live.forEach((m,i) => container.insertAdjacentHTML('beforeend', createMatchCard(m, i))); }
            if (pending.length) { container.insertAdjacentHTML('beforeend', `<h2 class="${h2Class} ${live.length?'mt-10':''}">GELECEK MAÇLAR</h2>`); pending.forEach((m,i) => container.insertAdjacentHTML('beforeend', createMatchCard(m, i))); }
            if (played.length) { container.insertAdjacentHTML('beforeend', `<h2 class="text-slate-500 font-black text-xl sm:text-2xl tracking-tighter uppercase border-b border-slate-100 pb-3 mb-4 mt-10">BİTEN MAÇLAR</h2>`); played.forEach((m,i) => container.insertAdjacentHTML('beforeend', createMatchCard(m, i))); }
            if (delayed.length) { container.insertAdjacentHTML('beforeend', `<h2 class="text-amber-600 font-black text-xl sm:text-2xl tracking-tighter uppercase border-b border-amber-100 pb-3 mb-4 mt-10">ERTELENEN / SKOR BEKLENEN</h2>`); delayed.forEach((m,i) => container.insertAdjacentHTML('beforeend', createMatchCard(m, i))); }
        }
    }

    function selectTeam(name) { state.selectedTeam = name; state.searchQuery = name; if(document.getElementById('team-search')) document.getElementById('team-search').value = name; try { history.pushState(null, null, '#' + normalize(name)); } catch(e) {} updateUI(); }
    function clearSelectedTeam() { state.selectedTeam = null; state.searchQuery = ""; if(document.getElementById('team-search')) document.getElementById('team-search').value = ""; try { history.pushState(null, null, window.location.pathname); } catch(e) { window.location.hash = ''; } updateUI(); }
    function handleSearch(val) { state.searchQuery = val; if (val && state.selectedTeam && normalize(val) !== normalize(state.selectedTeam)) state.selectedTeam = null; updateUI(); }
    function setStatusFilter(status) { state.selectedStatus = status; document.querySelectorAll('.status-btn').forEach(btn => btn.classList.remove('active')); document.getElementById(`filter-${status}`).classList.add('active'); updateUI(); }
    function isPlaceholderTeam(s) { if (!s) return true; let v = s.toLowerCase(); return v.includes(".si") || v.includes("galibi") || v.includes("yükselen"); }
    function getSortedDates() { return [...new Set(state.allMatches.map(m => m.date).filter(d => d))].sort((a,b) => dateToValue(a) - dateToValue(b)); }
    
    function calculateTeamStats(teamName) {
        const norm = normalize(teamName);
        let p = 0, w = 0, l = 0, d = 0, pen = 0;
        state.allMatches.forEach(m => {
            const t1 = normalize(getCoreName(m.t1)), t2 = normalize(getCoreName(m.t2));
            if (t1 === norm || t2 === norm) {
                if (isMatchPlayed(m)) {
                    p++; const s1 = parseInt(m.s1), s2 = parseInt(m.s2);
                    if (t1 === norm) { if(s1 > s2) w++; else l++; } else { if(s2 > s1) w++; else l++; }
                } else { if (isMatchDelayedOrMissing(m)) d++; else pen++; }
            }
        });
        return { played: p, wins: w, losses: l, delayed: d, pending: pen };
    }
    function showError(m) { const t = document.createElement('div'); t.className = "fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl z-[200] font-bold text-sm"; t.innerText = m; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }

    function initRosterForm() {
        const list = document.getElementById('players-list'); if (list.children.length > 0) return;
        let nsOptions = '<option value="">No</option>'; for(let n=1; n<=99; n++) { let ns = n<10 ? '0'+n : n.toString(); nsOptions += `<option value="${ns}">${ns}</option>`; }
        let html = '';
        for(let i=1; i<=18; i++) {
            html += `<div class="flex flex-row items-center gap-1.5 w-full mb-1.5">
                <span class="text-[11px] font-black text-slate-400 w-4 text-right shrink-0">${i}.</span>
                <select id="p-num-${i}" class="bg-white border border-slate-200 rounded-lg p-2 text-[10px] font-bold text-slate-700 outline-none w-[55px] shrink-0">${nsOptions}</select>
                <input type="text" id="p-name-${i}" placeholder="Sporcu Adı" class="flex-1 min-w-0 bg-white border border-slate-200 rounded-lg p-2 text-[10px] font-bold text-slate-800 outline-none">
                <select id="p-pos-${i}" class="bg-white border border-slate-200 rounded-lg p-2 text-[10px] font-bold text-slate-700 outline-none w-[90px] shrink-0">
                    <option value="">Mevki</option><option value="Pasör">Pasör</option><option value="Orta">Orta</option><option value="Smaçör">Smaçör</option><option value="Pasör Çaprazı">P. Çaprazı</option><option value="Libero">Libero</option>
                </select>
            </div>`;
        }
        list.innerHTML = html;
    }
    document.getElementById('whatsapp-send-btn').onclick = () => {
        const m = state.currentSharingMatch; if(!m) return;
        const note = document.getElementById('whatsapp-note').value.trim();
        const category = (m.kume + " " + m.tur + " " + m.gr).trim() || m.league;
        let msg = `*${isMatchPlayed(m) ? 'MAÇ SONUCU' : 'MAÇ GÜNÜ'}*\n🏆 Kategori: ${category}\n\n`;
        if(note) msg += `📝 ${note}\n\n`;
        if (isMatchPlayed(m)) msg += `🏐 *${m.t1}* : ${m.s1}\n🏐 *${m.t2}* : ${m.s2}\n\n*Setler:*\n${m.sets.replace(/<[^>]*>/g, '')}\n`;
        else msg += `🏐 *${m.t1}*\n🆚\n🏐 *${m.t2}*\n\n⏰ Saat: ${m.time}\n`;
        msg += `📍 Salon: ${m.venue}\n📅 Tarih: ${m.date}\n\n`;
        if (!isMatchPlayed(m)) {
            const coach = document.getElementById('coach-name').value; if(coach) msg += `*Antrenör:* ${coach}\n`;
            const serve = document.getElementById('team-serve-status').value; if(serve) msg += `*Servis:* ${serve}\n`;
            const mt = document.getElementById('meeting-time').value, ml = document.getElementById('meeting-location').value;
            if(mt || ml) msg += `\n*Toplanma:*\n${mt ? '⏰ Saat: '+mt+'\n' : ''}${ml ? '📍 Yer: '+ml+'\n' : ''}`;
            let pL = ''; for(let i=1; i<=18; i++){ const n = document.getElementById(`p-num-${i}`).value, nm = document.getElementById(`p-name-${i}`).value, ps = document.getElementById(`p-pos-${i}`).value; if(nm) pL += `${i}. #${n} ${nm} - ${ps}\n`; }
            if(pL) msg += `\n*Kadro:*\n${pL}`;
        }
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
        closeWhatsappModal();
    };

    function makeScrollable(id) {
        const el = document.getElementById(id); if(!el) return;
        let isDown = false, startX, scrollLeft;
        el.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - el.offsetLeft; scrollLeft = el.scrollLeft; });
        el.addEventListener('mouseleave', () => isDown = false);
        el.addEventListener('mouseup', () => isDown = false);
        el.addEventListener('mousemove', (e) => { if(!isDown) return; e.preventDefault(); const x = e.pageX - el.offsetLeft; const walk = (x - startX) * 2; el.scrollLeft = scrollLeft - walk; });
    }

    window.onload = () => { 
        startLiveClock(); setDailyQuote(); setRegion('istanbul');
        ['status-tabs', 'date-tabs', 'alphabet-index', 'region-tabs', 'top-logos-container'].forEach(makeScrollable);
    };
</script>
