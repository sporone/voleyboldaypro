<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Voleybol Day Pro | Canlı Veri Portalı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-primary: #6366f1;
            --brand-secondary: #f43f5e;
            --brand-dark: #1e1b4b;
            color-scheme: light; /* Zorunlu Dark Mode engellemesi */
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            scroll-behavior: smooth;
        }

        .match-card { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 2.5rem; 
        }
        
        .match-card:hover { 
            transform: scale(1.005);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.04);
            border-color: #e0e7ff;
        }

        .sticky-header { 
            position: sticky; 
            top: 0; 
            z-index: 50; 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .drag-scroll { cursor: grab; }
        .drag-scroll:active { cursor: grabbing; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .status-btn.active {
            background-color: white;
            color: var(--brand-primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .team-logo-circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #f1f5f9;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
        }

        .team-logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 4px;
            z-index: 2;
            position: relative;
            background: white;
        }

        .fallback-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 10px;
            color: #94a3b8;
            text-transform: uppercase;
            z-index: 1;
            background: #f8fafc;
        }

        .modal-overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(15, 23, 42, 0.8); 
            z-index: 100; 
            align-items: center; 
            justify-content: center; 
            padding: 1.5rem;
        }

        .modal-content {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            position: relative;
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .live-pulse {
            position: relative;
        }
        .live-pulse::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: inherit;
            background: currentColor;
            opacity: 0.4;
            animation: pulse-ring 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.6); opacity: 0; }
        }
    </style>
</head>
<body class="antialiased text-slate-900">

<div id="loading-overlay" class="fixed inset-0 bg-slate-50 z-[100] flex flex-col items-center justify-center gap-6 transition-opacity duration-300">
    <div class="relative w-24 h-24">
        <div class="absolute inset-0 border-4 border-indigo-100 rounded-full"></div>
        <div class="absolute inset-0 border-4 border-indigo-600 rounded-full border-t-transparent animate-spin"></div>
        <i class="fas fa-volleyball-ball absolute inset-0 flex items-center justify-center text-indigo-600 text-3xl animate-bounce"></i>
    </div>
    <div class="text-center">
        <h2 class="text-2xl font-black text-slate-800 mb-1 tracking-tighter uppercase">Voleybol Day Pro</h2>
        <p class="text-sm text-slate-500 font-medium" id="loading-text">Veriler Senkronize Ediliyor...</p>
    </div>
</div>

<div id="app" class="max-w-[1600px] mx-auto min-h-screen pb-20">
    <!-- Header: Mobil uyumlu boşluklar ve ortalama ayarlandı -->
    <header class="bg-indigo-950 text-white pt-12 pb-36 md:pt-16 md:pb-32 px-4 md:px-6 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-[700px] h-[700px] bg-indigo-500 rounded-full opacity-10 blur-[130px] -mr-48 -mt-48 pointer-events-none"></div>
        <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-6 md:gap-8 container mx-auto">
            
            <div class="space-y-2 md:space-y-4 flex flex-col items-center md:items-start text-center md:text-left w-full md:w-auto">
                <h1 class="text-4xl md:text-6xl lg:text-7xl font-black tracking-tighter">
                    Voleybol <span class="text-indigo-400">Day</span> Pro
                </h1>
                <p class="text-indigo-200/70 font-medium text-sm md:text-lg max-w-lg">Takım odaklı canlı veri ve paylaşım portalı.</p>
            </div>
            
            <!-- Sağ Üst: Butonlar Grubu -->
            <div class="flex flex-row items-center justify-center md:justify-end gap-2 sm:gap-3 w-full md:w-auto mt-2 md:mt-0">
                
                <!-- Saat & Tarih -->
                <div class="bg-white/5 backdrop-blur-xl px-3 py-2 sm:px-4 sm:py-2.5 rounded-2xl border border-white/10 shadow-xl flex items-center gap-2.5">
                    <div class="bg-indigo-500/20 w-8 h-8 sm:w-10 sm:h-10 rounded-full flex items-center justify-center text-indigo-300 shrink-0">

                <!-- Maç Sayısı -->
                <div class="bg-white/5 backdrop-blur-xl px-3 py-2 sm:px-4 sm:py-2.5 rounded-2xl border border-white/10 shadow-xl min-w-[50px] sm:min-w-[70px] text-center flex flex-col justify-center">
                    <span class="block text-[8px] sm:text-[9px] uppercase font-bold text-indigo-300 tracking-widest mb-0.5">Maçlar</span>
                    <span id="match-count-badge" class="text-xl sm:text-2xl font-black leading-none text-white">0</span>

                <!-- Yenile Butonu -->
                <button onclick="fetchData()" class="bg-white text-indigo-950 w-10 h-10 sm:w-12 sm:h-12 rounded-2xl flex items-center justify-center hover:bg-indigo-50 transition-all group shadow-xl active:scale-95 shrink-0">
                    <i class="fas fa-sync-alt text-sm sm:text-base group-active:rotate-180 transition-transform duration-500"></i>
                </button>
            </div>

        </div>
    </header>

    <div class="-mt-16 px-4 container mx-auto">
        <div class="relative max-w-6xl mx-auto">
            
            <!-- Seçili Takım Göstergesi -->
            <div id="selected-team-display" class="hidden absolute left-1/2 -translate-x-1/2 -top-[3.5rem] z-[60] flex-col items-center">
                <div onclick="clearSelectedTeam()" title="Seçimi kaldırmak için tıklayın" class="bg-indigo-900/90 backdrop-blur-xl border border-indigo-400/30 p-2 rounded-full shadow-[0_15px_40px_-10px_rgba(99,102,241,0.5)] flex items-center justify-center cursor-pointer hover:scale-105 transition-all animate-[modalPop_0.3s_ease-out]">
                    <div id="selected-team-logo" class="flex items-center justify-center bg-white rounded-full"></div>
                </div>
            </div>

            <div class="sticky-header bg-white/95 shadow-2xl shadow-indigo-900/5 rounded-[3rem] p-5 md:p-10 border border-white flex flex-col gap-6 relative z-50">
                
                <!-- Üst Satır: Sekmeler ve Günün Sözü -->
                <div class="flex flex-col lg:flex-row items-stretch lg:items-center justify-between gap-6">
                    <div id="status-tabs" class="drag-scroll flex bg-slate-100 p-2 rounded-2xl w-full lg:w-auto overflow-x-auto no-scrollbar select-none transition-opacity duration-300">
                        <button onclick="setStatusFilter('all')" id="filter-all" class="status-btn active flex-1 md:flex-none px-8 py-3.5 rounded-xl text-[11px] font-black uppercase transition-all whitespace-nowrap">Hepsi</button>
                        <button onclick="setStatusFilter('played')" id="filter-played" class="status-btn flex-1 md:flex-none px-8 py-3.5 rounded-xl text-[11px] font-black uppercase transition-all text-slate-500 whitespace-nowrap">Bitenler</button>
                        <button onclick="setStatusFilter('pending')" id="filter-pending" class="status-btn flex-1 md:flex-none px-8 py-3.5 rounded-xl text-[11px] font-black uppercase transition-all text-slate-500 whitespace-nowrap">Gelecek</button>
                    </div>

                    <!-- Günün Sözü -->
                    <div id="daily-quote-container" class="flex-1 w-full flex items-center justify-center bg-indigo-50/50 border border-indigo-100 rounded-2xl py-3.5 px-6 transition-opacity duration-300">
                        <p class="text-[13px] font-semibold text-indigo-900 text-center">
                            <i class="fas fa-quote-left text-indigo-300 mr-2 opacity-50"></i>
                            <span id="daily-quote-text" class="italic"></span>
                            <i class="fas fa-quote-right text-indigo-300 ml-2 opacity-50"></i>
                        </p>
                    </div>
                </div>

                <!-- Alt Satır: Arama Çubuğu -->
                <div class="w-full relative group">
                    <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="team-search" oninput="handleSearch(this.value)" placeholder="Takım veya lig ara..." 
                           class="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-100 focus:bg-white rounded-2xl py-4.5 pl-14 pr-6 text-sm font-semibold outline-none transition-all">
                </div>

                <div id="date-tabs-wrapper" class="border-t border-slate-100 pt-6 transition-all duration-300">
                    <div id="date-tabs" class="drag-scroll flex gap-3 overflow-x-auto w-full no-scrollbar pb-1 select-none"></div>
                </div>
                
                <div id="quick-filters" class="flex flex-col gap-3 border-t border-slate-100 pt-6 empty:hidden transition-all duration-300">
                    <div class="flex flex-wrap gap-2 items-center empty:hidden" id="league-chips"></div>
                    <div class="flex flex-wrap gap-2 items-center empty:hidden" id="gender-chips"></div>
                </div>

                <div id="playing-teams-wrapper" class="border-t border-slate-100 pt-5 mt-2 hidden">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest"><i class="fas fa-users mr-1"></i> Sistemdeki Takımlar</h3>
                        <span class="text-[9px] font-bold text-slate-300 uppercase">A-Z Filtresi</span>
                    </div>
                    <div id="alphabet-index" class="drag-scroll flex gap-1.5 overflow-x-auto w-full no-scrollbar pb-3 mb-3 select-none border-b border-slate-50"></div>
                    <div id="playing-teams" class="flex flex-wrap gap-2.5 w-full max-h-[180px] overflow-y-auto custom-scrollbar pb-2 pr-2 select-none"></div>
                </div>
            </div>
        </div>

    <!-- Match Container -->
    <main id="match-container" class="mt-12 px-4 container mx-auto flex flex-col gap-6 max-w-6xl mx-auto"></main>
    
    <div id="empty-state" class="hidden flex-col items-center justify-center py-40 text-slate-300">
        <i class="fas fa-volleyball-ball text-8xl mb-6 opacity-10"></i>
        <p class="font-bold text-xl tracking-tight">Eşleşen maç bulunamadı.</p>

</div>

</div>

<script>
    const SHEET_ID = '1czqD3fVZD-P8zuefoikXfIisTmqSbSxN-4YXiibxkic';
    const MATCHES_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
    const LOGOS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=logolar`;

    const CONSTANT_LOGOS = {
        "fenerbahçe": "https://upload.wikimedia.org/wikipedia/tr/8/86/Fenerbah%C3%A7e_SK.png",
        "altınyurt": "https://volleybox.net/media/upload/teams/big_1738135332HXY9f.png",
        "istanbulgençlik": "https://kaltaltekma.com/fs/file/kalt/sk.kalt/team/7/%C4%B0stanbul-Genclik-Spor.png",
        "istanbuldinamikyıldız": "https://i.ibb.co/XrnZzHpt/image-5d5159.png",
        "istanbulvoleybol": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRsD8IIcspm7enQ5M0RCafDgCrqtIwELl65rg&s",
        "istanbulalpspor": "https://volleybox.net/media/upload/teams/big_1739362957CMG3q.png",
        "güzelyaşam": "https://volleybox.net/media/upload/teams/big_1756371499s9PAo.png",
        "beylikdüzüvoleybol": "https://volleybox.net/media/upload/teams/1763730802sA6Gu.png",
        "gökspor": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQaX4FBAECEqrOBwGQ0VVskBl6KOiV-x7i-zA&s",
        "geleceğedönüş": "https://volleybox.net/media/upload/teams/big_1755074095wU74u.png"
    };

    const MOTIVATION_QUOTES = [
        "Başarı, hazırlık ve fırsatın buluştuğu yerdir.",
        "Düşmek önemli değil, düştüğün yerden daha güçlü kalkmak önemlidir.",
        "Sahadaki en büyük yetenek, asla pes etmeme yeteneğidir.",
        "Ter dökmeden dökülen gözyaşı, zafer getirmez.",
        "Zorluklar, sıradan insanları sıra dışı başarılara hazırlar.",
        "Şampiyonlar salonlarda yapılmaz. Şampiyonlar içlerindeki tutkuyla oluşur.",
        "Bir takımın gücü, her bir üyesidir. Her bir üyenin gücü ise takımdır.",
        "Sınırlarını zorla, çünkü mucizeler sınırların bittiği yerde başlar.",
        "Maç sahada kazanılmadan önce zihinde kazanılır.",
        "Yetenek maçı kazandırır, ancak zeka ve takım oyunu şampiyonluğu.",
        "Her antrenman, zafere atılan bir adımdır.",
        "İnanç, görünmeyene inanmaktır. Ödülü ise inandığını görmektir.",
        "Mazeretler, sadece başarısızlıkların süslü kılıflarıdır.",
        "Geri adım atmak sadece daha uzağa sıçramak içindir.",
        "Asla pes etme! Çünkü tam vazgeçtiğin an, mucizenin gerçekleşeceği andır."
    ];

    let state = {
        allMatches: [],
        logoMap: {},
        currentDate: "",
        selectedStatus: "all",
        searchQuery: "",
        selectedLeague: null,
        selectedGender: null,
        selectedAlphabet: null,
        selectedTeam: null,
        loading: true,
        currentSharingMatch: null
    };

    function setDailyQuote() {
        const today = new Date();
        const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
        const quoteIndex = dayOfYear % MOTIVATION_QUOTES.length;
        document.getElementById('daily-quote-text').innerText = MOTIVATION_QUOTES[quoteIndex];
    }

    function makeScrollable(elementId) {
        const slider = document.getElementById(elementId);
        if (!slider) return;
        let isDown = false; let startX; let scrollLeft;
        slider.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });
        slider.addEventListener('mouseleave', () => { isDown = false; });
        slider.addEventListener('mouseup', () => { isDown = false; });
        slider.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX - slider.offsetLeft; const walk = (x - startX) * 2; slider.scrollLeft = scrollLeft - walk; });
    }

    function getTurkeyTime() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        return new Date(utc + (3600000 * 3));
    }

    function getTodayString() {
        const trTime = getTurkeyTime();
        const d = String(trTime.getDate()).padStart(2, '0');
        const m = String(trTime.getMonth() + 1).padStart(2, '0');
        const y = trTime.getFullYear();
        return `${d}.${m}.${y}`;
    }

    function startLiveClock() {
        const timeEl = document.getElementById('live-time');
        const dateEl = document.getElementById('live-date');
        function update() {
            const tr = getTurkeyTime();
            const hours = String(tr.getHours()).padStart(2, '0');
            const minutes = String(tr.getMinutes()).padStart(2, '0');
            if(timeEl) timeEl.innerText = `${hours}:${minutes}`;
            const days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            const months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
            if(dateEl) dateEl.innerText = `${tr.getDate()} ${months[tr.getMonth()]} ${days[tr.getDay()]}`;
        }
        update();
        setInterval(update, 10000);
    }

    function cleanTeamName(str) {
        if (!str) return "";
        return str.toString().replace(/^\(H\)\s*[-–—]?\s*/i, '').trim();
    }

    function getBaseTeamName(str) {
        if (!str) return "";
        return cleanTeamName(str).trim().replace(/\s+[a-zA-Z0-9]$/i, '').trim();
    }

    function normalize(str) {
        if (!str) return "";
        return cleanTeamName(str).toLocaleLowerCase('tr-TR').replace(/sk$/g, '').replace(/s\.k$/g, '').replace(/kulübü/g, '').replace(/\s+/g, '').replace(/[\.\,\-\(\)]/g, ''); 
    }

    function wrapProxy(url) {
        if (!url) return "";
        const cleanUrl = url.toString().replace(/^"|"$/g, '').trim();
        if (cleanUrl.startsWith('data:')) return cleanUrl;
        return `https://images.weserv.nl/?url=${encodeURIComponent(cleanUrl)}&default=${encodeURIComponent(cleanUrl)}`;
    }

    function fixLogoUrl(url) {
        if (!url) return "";
        url = url.toString().replace(/^"|"$/g, '').trim();
        if (url.includes('drive.google.com')) {
            const idMatch = url.match(/\/d\/([^\/]+)/) || url.match(/id=([^\&]+)/);
            if (idMatch && idMatch[1]) return `https://docs.google.com/uc?export=download&id=${idMatch[1]}`;
        }
        return url;
    }

    function parseCSVLine(line) {
        const parts = []; let curr = ''; let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { parts.push(curr); curr = ''; }
            else curr += char;
        }
        parts.push(curr);
        return parts;
    }

    async function fetchData() {
        try {
            document.getElementById('loading-overlay').classList.remove('hidden');
            const timestamp = Date.now();
            const [mRes, lRes] = await Promise.all([
                fetch(`${MATCHES_URL}&cb=${timestamp}`),
                fetch(`${LOGOS_URL}&cb=${timestamp}`)
            ]);
            state.logoMap = parseLogos(await lRes.text());
            state.allMatches = parseMatches(await mRes.text());
            if (state.allMatches.length > 0) {
                const dates = getSortedDates();
                const todayStr = getTodayString();
                if (!state.currentDate) {
                    if (dates.includes(todayStr)) state.currentDate = todayStr;
                    else state.currentDate = dates[0];
                } else if (!dates.includes(state.currentDate)) {
                    state.currentDate = dates[0];
                }
            }
            state.loading = false;
            document.getElementById('loading-overlay').classList.add('hidden');
            updateUI();
        } catch (error) { showError("Veri yüklenirken bir hata oluştu."); }
    }

    function parseLogos(csv) {
        const lines = csv.split(/\r?\n/);
        const map = {...CONSTANT_LOGOS}; 
        lines.forEach(line => {
            const p = parseCSVLine(line);
            if (p.length >= 2) {
                const name = normalize(p[0].replace(/^"|"$/g, ''));
                const url = fixLogoUrl(p[1]);
                if (name && url && url.startsWith('http')) map[name] = url;
            }
        });
        return map;
    }

    function parseMatches(csv) {
        const lines = csv.split(/\r?\n/);
        return lines.slice(1).filter(l => l.trim()).map(line => {
            const p = parseCSVLine(line);
            return {
                date: p[0] || "", venue: p[1] || "", time: p[2] || "",
                t1: cleanTeamName(p[3]), s1: p[4] || "-", s2: p[5] || "-", t2: cleanTeamName(p[6]),
                sets: p[7] || "Oynanmadı", gender: p[9] || "M", league: p[10] || "LİG"
            };
        });
    }

    function getLogoHtml(teamName, sizeClass = "w-12 h-12") {
        const normalizedName = normalize(teamName);
        let rawUrl = null;
        for (const key in state.logoMap) {
            if (normalizedName.includes(key) || key.includes(normalizedName)) {
                rawUrl = state.logoMap[key]; break;
            }
        }
        const url = wrapProxy(rawUrl);
        const initials = teamName.substring(0, 2).toUpperCase();
        return `
            <div class="team-logo-circle ${sizeClass} relative bg-transparent !border-none !shadow-none">
                <span class="fallback-text !bg-transparent">${initials}</span>
                ${rawUrl ? `<img src="${url}" class="relative z-10" loading="lazy" crossorigin="anonymous" onerror="this.style.opacity='0';">` : ''}
            </div>`;
    }

    function parseSetScoresHtml(sets) {
        let r1 = ''; let r2 = '';
        let matches = [];
        if (sets && !sets.toLowerCase().includes("oynanmadı") && sets !== "-") {
            matches = [...sets.matchAll(/\((\d+)-(\d+)\)/g)];
        }
        for (let i = 0; i < 5; i++) {
            if (i < matches.length) {
                const v1 = parseInt(matches[i][1]); 
                const v2 = parseInt(matches[i][2]);
                const c1 = v1 > v2 ? 'text-[#c8102e]' : 'text-slate-400';
                const c2 = v2 > v1 ? 'text-[#c8102e]' : 'text-slate-400';
                r1 += `<span class="w-5 md:w-6 text-center ${c1}">${v1}</span>`;
                r2 += `<span class="w-5 md:w-6 text-center ${c2}">${v2}</span>`;
            } else {
                r1 += `<span class="w-5 md:w-6 text-center text-slate-300">-</span>`;
                r2 += `<span class="w-5 md:w-6 text-center text-slate-300">-</span>`;
            }
        }
        return { row1: r1, row2: r2 };
    }

    function checkLiveStatus(m) {
        const trTime = getTurkeyTime();
        const todayStr = trTime.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        const s1 = parseInt(m.s1); const s2 = parseInt(m.s2);
        if (!isNaN(s1) && !isNaN(s2) && (s1 >= 3 || s2 >= 3)) return false;
        if (m.date === todayStr) {
            const [mH, mM] = m.time.split(':').map(Number);
            const matchMins = mH * 60 + (mM || 0);
            const currentMins = trTime.getHours() * 60 + trTime.getMinutes();
            if (m.s1 !== "-" || currentMins >= matchMins) return true;
        }
        return false;
    }

    const dateToValue = (d) => {
        if (!d) return 0;
        const p = d.split('.').map(Number);
        if (p.length !== 3) return 0;
        return new Date(p[2], p[1]-1, p[0]).getTime();
    };

    const timeToMins = (t) => {
        const parts = (t || "00:00").split(':');
        return (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0);
    };

    function createMatchCard(m) {
        const isLive = checkLiveStatus(m);
        const encodedMatch = encodeURIComponent(JSON.stringify(m));
        const setScores = parseSetScoresHtml(m.sets);

        return `
            <div class="match-card bg-white p-4 lg:p-5 shadow-sm flex flex-col lg:flex-row items-center gap-4 lg:gap-6 relative overflow-hidden group/card w-full border border-slate-200 rounded-[1.25rem]">
                <div class="w-full lg:w-[170px] shrink-0 flex flex-col gap-3">
                    <div class="bg-slate-100/80 rounded-xl p-3 text-xs text-slate-500 font-medium leading-relaxed relative">
                        ${m.league} • ${m.gender === 'E' ? 'Erkek' : 'Kadın'}<br>
                        ${m.date} - ${m.time}
                        ${isLive ? '<div class="absolute top-2 right-2 flex items-center gap-1 text-rose-500 font-black text-[9px] uppercase animate-pulse"><span class="w-1.5 h-1.5 bg-rose-500 rounded-full"></span>CANLI</div>' : ''}
                    </div>
                    <div class="flex items-start gap-2 text-xs text-slate-500 font-medium px-1">
                        <i class="fas fa-map-marker-alt mt-0.5 text-slate-400"></i>
                        <span class="leading-tight">${m.venue}</span>
                    </div>
                </div>

                <div class="flex-1 flex flex-row items-center justify-between w-full overflow-hidden border-t lg:border-t-0 pt-4 lg:pt-0 border-slate-100">
                    <div class="flex flex-col justify-between h-[68px] flex-1 pr-2 md:pr-4 min-w-0">
                        <div class="flex items-center gap-3 flex-1 min-w-0">
                            ${getLogoHtml(m.t1, "w-7 h-7 md:w-8 md:h-8")}
                            <span class="text-sm font-bold text-slate-900 uppercase tracking-tight truncate">${m.t1}</span>
                        </div>
                        <div class="flex items-center gap-3 flex-1 min-w-0">
                            ${getLogoHtml(m.t2, "w-7 h-7 md:w-8 md:h-8")}
                            <span class="text-sm font-bold text-slate-900 uppercase tracking-tight truncate">${m.t2}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 md:gap-5 shrink-0">
                        <div class="bg-[#1a1a1a] rounded-md flex flex-col w-7 md:w-8 h-[64px] text-white font-bold text-[13px] md:text-sm">
                            <div class="flex-1 flex items-center justify-center border-b border-gray-700">${m.s1 === '-' ? '' : m.s1}</div>
                            <div class="flex-1 flex items-center justify-center">${m.s2 === '-' ? '' : m.s2}</div>
                        </div>
                        <div class="flex flex-col justify-between h-[64px] font-bold text-[13px] md:text-sm">
                            <div class="flex-1 flex items-center gap-1 md:gap-2">${setScores.row1}</div>
                            <div class="flex-1 flex items-center gap-1 md:gap-2">${setScores.row2}</div>
                        </div>
                    </div>
                </div>

                <div class="w-full lg:w-[130px] shrink-0 flex justify-end lg:justify-center items-center lg:border-l border-slate-100 lg:pl-4 mt-2 lg:mt-0 pt-3 lg:pt-0">
                     <button onclick="openWhatsappModal('${encodedMatch}')" class="text-[#c8102e] hover:text-red-800 font-medium text-sm flex items-center gap-1.5 transition-all group-hover/card:translate-x-1 whitespace-nowrap">
                         WhatsApp <i class="fab fa-whatsapp text-lg"></i> <i class="fas fa-arrow-right text-[10px] ml-1"></i>
                     </button>
                </div>
            </div>`;
    }

    function openWhatsappModal(mStr) {
        const m = JSON.parse(decodeURIComponent(mStr));
        state.currentSharingMatch = m;
        document.getElementById('whatsapp-modal').style.display = 'flex';
        document.getElementById('whatsapp-note').value = '';
    }

    function closeWhatsappModal() { document.getElementById('whatsapp-modal').style.display = 'none'; }

    document.getElementById('whatsapp-send-btn').onclick = function() {
        if (!state.currentSharingMatch) return;
        const m = state.currentSharingMatch;
        const note = document.getElementById('whatsapp-note').value.trim();
        const isPlayed = m.s1 !== "-" && m.s1 !== "";
        const category = `${m.league} (${m.gender === 'E' ? 'Erkek' : 'Kadın'})`;
        let header = isPlayed ? "MAC SONUCU" : "MAC GUNU";
        let msg = `*${header}*\nKategori: ${category}\n\n`; 
        if (note) msg += `${note}\n\n`;
        if (isPlayed) msg += `*${m.t1} ${m.s1} - ${m.s2} ${m.t2}*\n\nSetler: ${m.sets.replace(/<[^>]*>/g, '')}\n`;
        else msg += `*${m.t1} vs ${m.t2}*\n\nSaat: ${m.time}\n`;
        msg += `Salon: ${m.venue}\nTarih: ${m.date}`;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
        closeWhatsappModal();
    };

    function renderMatchGroups(matchArray, container) {
        let played = matchArray.filter(m => m.s1 !== '-' && !m.sets.toLowerCase().includes("oynanmadı") && !checkLiveStatus(m));
        let live = matchArray.filter(m => checkLiveStatus(m));
        let pending = matchArray.filter(m => (m.s1 === '-' || m.sets.toLowerCase().includes("oynanmadı")) && !checkLiveStatus(m));

        live.sort((a, b) => {
            const diff = dateToValue(a.date) - dateToValue(b.date);
            if (diff !== 0) return diff;
            return timeToMins(a.time) - timeToMins(b.time);
        });

        pending.sort((a, b) => {
            const diff = dateToValue(a.date) - dateToValue(b.date);
            if (diff !== 0) return diff;
            return timeToMins(a.time) - timeToMins(b.time);
        });

        played.sort((a, b) => {
            const diff = dateToValue(b.date) - dateToValue(a.date);
            if (diff !== 0) return diff;
            return timeToMins(b.time) - timeToMins(a.time);
        });

        if (live.length > 0) {
            container.insertAdjacentHTML('beforeend', `<div class="w-full mb-1 mt-2"><h2 class="text-xl font-black text-rose-600 flex items-center gap-2 uppercase tracking-tighter pb-2 border-b border-slate-100"><span class="w-2.5 h-2.5 bg-rose-500 rounded-full animate-pulse"></span> Canlı Maçlar</h2></div>`);
            live.forEach(m => container.insertAdjacentHTML('beforeend', createMatchCard(m)));
        }

        if (pending.length > 0) {
            container.insertAdjacentHTML('beforeend', `<div class="w-full mb-1 mt-6 first:mt-2"><h2 class="text-xl font-black text-indigo-950 flex items-center gap-2 uppercase tracking-tighter pb-2 border-b border-slate-100"><i class="fas fa-calendar-alt text-indigo-500"></i> Gelecek Maçlar</h2></div>`);
            pending.forEach(m => container.insertAdjacentHTML('beforeend', createMatchCard(m)));
        }

        if (played.length > 0) {
            container.insertAdjacentHTML('beforeend', `<div class="w-full mb-1 mt-6 first:mt-2"><h2 class="text-xl font-black text-slate-700 flex items-center gap-2 uppercase tracking-tighter pb-2 border-b border-slate-100"><i class="fas fa-check-circle text-green-500"></i> Biten Maçlar</h2></div>`);
            played.forEach(m => container.insertAdjacentHTML('beforeend', createMatchCard(m)));
        }
    }

    function clearSelectedTeam() {
        state.selectedTeam = null;
        document.getElementById('team-search').value = '';
        handleSearch('');
    }

    function renderMatches() {
        const container = document.getElementById('match-container');
        container.innerHTML = '';
        
        let matchesToRender = [];

        if (state.selectedTeam) {
            matchesToRender = state.allMatches.filter(m => getBaseTeamName(m.t1) === state.selectedTeam || getBaseTeamName(m.t2) === state.selectedTeam);
        } else {
            matchesToRender = state.allMatches.filter(m => m.date === state.currentDate);

            if (state.selectedStatus === 'played') matchesToRender = matchesToRender.filter(m => m.s1 !== '-' && !m.sets.toLowerCase().includes("oynanmadı"));
            else if (state.selectedStatus === 'pending') matchesToRender = matchesToRender.filter(m => m.s1 === '-' || m.sets.toLowerCase().includes("oynanmadı"));
            
            if (state.selectedLeague) matchesToRender = matchesToRender.filter(m => m.league === state.selectedLeague);
            if (state.selectedGender) matchesToRender = matchesToRender.filter(m => m.gender === state.selectedGender);
            
            if (state.searchQuery) {
                const q = normalize(state.searchQuery);
                matchesToRender = matchesToRender.filter(m => normalize(m.t1).includes(q) || normalize(m.t2).includes(q) || normalize(m.league).includes(q));
            }
        }

        document.getElementById('match-count-badge').innerText = matchesToRender.length;

        if (matchesToRender.length === 0) {
            document.getElementById('empty-state').classList.remove('hidden');
        } else {
            document.getElementById('empty-state').classList.add('hidden');
            renderMatchGroups(matchesToRender, container);
        }
    }

    function updateUI() { 
        const statusTabs = document.getElementById('status-tabs');
        const dailyQuoteContainer = document.getElementById('daily-quote-container');
        const dateTabsWrapper = document.getElementById('date-tabs-wrapper');
        const quickFilters = document.getElementById('quick-filters');
        
        const selectedTeamDisplay = document.getElementById('selected-team-display');
        const selectedTeamLogo = document.getElementById('selected-team-logo');
        
        if (state.selectedTeam) {
            statusTabs.classList.add('opacity-30', 'pointer-events-none');
            dailyQuoteContainer.classList.add('opacity-30', 'pointer-events-none');
            dateTabsWrapper.classList.add('hidden');
            quickFilters.classList.add('hidden');
            
            selectedTeamDisplay.classList.remove('hidden');
            selectedTeamDisplay.classList.add('flex');
            selectedTeamLogo.innerHTML = getLogoHtml(state.selectedTeam, "w-14 h-14"); 
        } else {
            statusTabs.classList.remove('opacity-30', 'pointer-events-none');
            dailyQuoteContainer.classList.remove('opacity-30', 'pointer-events-none');
            dateTabsWrapper.classList.remove('hidden');
            quickFilters.classList.remove('hidden');
            
            selectedTeamDisplay.classList.add('hidden');
            selectedTeamDisplay.classList.remove('flex');
        }

        renderDateTabs(); 
        renderLeagueChips();
        renderGenderChips();
        renderPlayingTeams();
        renderMatches(); 
    }
    
    function renderDateTabs() {
        const container = document.getElementById('date-tabs');
        const dates = getSortedDates();
        container.innerHTML = '';
        dates.forEach(date => {
            const isActive = date === state.currentDate;
            const btn = document.createElement('button');
            btn.className = `px-7 py-3.5 rounded-2xl text-[11px] font-black transition-all shrink-0 uppercase border select-none ${isActive ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg' : 'bg-white text-slate-500 border-slate-100 hover:bg-slate-50'}`;
            btn.innerText = date;
            btn.onclick = () => { 
                state.currentDate = date; 
                state.selectedLeague = null;
                state.selectedGender = null;
                updateUI(); 
            };
            container.appendChild(btn);
        });
    }

    function renderLeagueChips() {
        const container = document.getElementById('league-chips');
        let source = state.allMatches.filter(m => m.date === state.currentDate);
        const leagues = [...new Set(source.map(m => m.league))].filter(Boolean).sort();
        if (leagues.length === 0) { container.innerHTML = ''; return; }
        container.innerHTML = `<span class="text-[10px] font-black text-slate-400 uppercase tracking-widest mr-2"><i class="fas fa-trophy mr-1"></i> Lig:</span>`;
        leagues.forEach(l => {
            const isActive = state.selectedLeague === l;
            const chip = document.createElement('button');
            chip.className = `px-4 py-1.5 rounded-full text-[10px] font-bold border transition-all select-none ${isActive ? 'bg-indigo-100 border-indigo-200 text-indigo-700' : 'bg-slate-50 border-slate-200 text-slate-500 hover:bg-slate-100'}`;
            chip.innerText = l;
            chip.onclick = () => { state.selectedLeague = isActive ? null : l; updateUI(); };
            container.appendChild(chip);
        });
    }

    function renderGenderChips() {
        const container = document.getElementById('gender-chips');
        let source = state.allMatches.filter(m => m.date === state.currentDate);
        const genders = [...new Set(source.map(m => m.gender))].filter(Boolean).sort();
        if (genders.length === 0) { container.innerHTML = ''; return; }
        container.innerHTML = `<span class="text-[10px] font-black text-slate-400 uppercase tracking-widest mr-2"><i class="fas fa-venus-mars mr-1"></i> Kategori:</span>`;
        genders.forEach(g => {
            const isActive = state.selectedGender === g;
            const label = g === 'E' ? 'Erkek' : (g === 'K' ? 'Kadın' : g);
            const chip = document.createElement('button');
            chip.className = `px-4 py-1.5 rounded-full text-[10px] font-bold border transition-all select-none ${isActive ? 'bg-indigo-100 border-indigo-200 text-indigo-700' : 'bg-slate-50 border-slate-200 text-slate-500 hover:bg-slate-100'}`;
            chip.innerText = label;
            chip.onclick = () => { state.selectedGender = isActive ? null : g; updateUI(); };
            container.appendChild(chip);
        });
    }

    function renderPlayingTeams() {
        const container = document.getElementById('playing-teams');
        const wrapper = document.getElementById('playing-teams-wrapper');
        const alphabetContainer = document.getElementById('alphabet-index');
        
        const teamsSet = new Set();
        state.allMatches.forEach(m => {
            if (m.t1 && m.t1 !== "-") teamsSet.add(getBaseTeamName(m.t1));
            if (m.t2 && m.t2 !== "-") teamsSet.add(getBaseTeamName(m.t2));
        });
        const teams = Array.from(teamsSet).sort((a, b) => a.localeCompare(b, 'tr'));
        
        if (teams.length === 0) { 
            wrapper.classList.add('hidden'); 
            return; 
        } else { 
            wrapper.classList.remove('hidden'); 
        }

        const alphabet = ['Hepsi', '0-9', 'A', 'B', 'C', 'Ç', 'D', 'E', 'F', 'G', 'H', 'I', 'İ', 'J', 'K', 'L', 'M', 'N', 'O', 'Ö', 'P', 'Q', 'R', 'S', 'Ş', 'T', 'U', 'Ü', 'V', 'W', 'X', 'Y', 'Z'];

        const teamsByLetter = {};
        alphabet.forEach(l => teamsByLetter[l] = []);
        
        teams.forEach(team => {
            const firstChar = team.charAt(0).toLocaleUpperCase('tr-TR');
            if (/[0-9]/.test(firstChar)) {
                teamsByLetter['0-9'].push(team);
            } else {
                if (teamsByLetter[firstChar]) {
                    teamsByLetter[firstChar].push(team);
                } else {
                    const fallbackChar = team.charAt(0).toUpperCase();
                    if (teamsByLetter[fallbackChar]) {
                        teamsByLetter[fallbackChar].push(team);
                    }
                }
            }
            teamsByLetter['Hepsi'].push(team);
        });

        alphabetContainer.innerHTML = '';
        alphabet.forEach(letter => {
            const hasTeams = teamsByLetter[letter] && teamsByLetter[letter].length > 0;
            const isActive = state.selectedAlphabet === letter;
            
            const btn = document.createElement('button');
            if (hasTeams || letter === 'Hepsi') {
                btn.className = `shrink-0 flex items-center justify-center rounded-xl text-[11px] font-black transition-all ${isActive ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-indigo-100 hover:text-indigo-700'} ${letter === 'Hepsi' ? 'px-4 h-8' : 'w-8 h-8'}`;
                btn.innerText = letter;
                btn.onclick = () => {
                    state.selectedAlphabet = isActive ? null : letter;
                    renderPlayingTeams(); 
                };
            } else {
                btn.className = `w-8 h-8 shrink-0 flex items-center justify-center rounded-xl text-[11px] font-black text-slate-300 bg-slate-50/50 cursor-not-allowed border border-slate-100/50`;
                btn.innerText = letter;
            }
            alphabetContainer.appendChild(btn);
        });

        container.innerHTML = '';

        if (!state.selectedAlphabet) {
            container.innerHTML = '<span class="text-[11px] text-slate-400 font-medium py-3 px-2 flex items-center gap-2"><i class="fas fa-hand-pointer text-indigo-400"></i> Takımları görmek için yukarıdan bir harf veya "Hepsi" seçeneğine tıklayın.</span>';
            return;
        }
        
        const teamsToShow = teamsByLetter[state.selectedAlphabet] || [];
        
        if (teamsToShow.length === 0) {
            container.innerHTML = '<span class="text-[11px] text-slate-400 font-medium py-2 px-1">Bu harfle başlayan takım bulunmamaktadır.</span>';
        }

        teamsToShow.forEach(team => {
            const isActive = state.selectedTeam === team;
            const chip = document.createElement('div');
            chip.className = `flex items-center gap-2.5 px-3 py-2 rounded-2xl border transition-all cursor-pointer select-none shrink-0 ${isActive ? 'bg-indigo-600 border-indigo-600 shadow-md' : 'bg-white border-slate-200 hover:bg-slate-50'}`;
            chip.onclick = () => {
                if (isActive) { 
                    clearSelectedTeam();
                } else {
                    state.selectedTeam = team;
                    document.getElementById('team-search').value = team;
                    
                    const teamPlaysToday = state.allMatches.some(m => m.date === state.currentDate && (getBaseTeamName(m.t1) === team || getBaseTeamName(m.t2) === team));
                    if (!teamPlaysToday) {
                        const nextMatch = state.allMatches.find(m => getBaseTeamName(m.t1) === team || getBaseTeamName(m.t2) === team);
                        if (nextMatch) state.currentDate = nextMatch.date;
                    }
                    
                    handleSearch(team);
                }
            };
            const textColor = isActive ? 'text-white' : 'text-slate-700';
            chip.innerHTML = `${getLogoHtml(team, "w-7 h-7 border-none shadow-none bg-transparent")} <span class="text-[11px] font-bold ${textColor}">${team}</span>`;
            container.appendChild(chip);
        });
    }
    
    function setStatusFilter(s) { state.selectedStatus = s; document.querySelectorAll('.status-btn').forEach(b => b.classList.toggle('active', b.id === `filter-${s}`)); updateUI(); }
    
    function handleSearch(v) { 
        state.searchQuery = v; 
        if (state.selectedTeam && v !== state.selectedTeam) {
            state.selectedTeam = null;
        }
        updateUI(); 
    }
    
    function showError(m) { 
        const t = document.createElement('div'); t.className = "fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl z-[200] font-bold text-sm animate-bounce"; t.innerText = m; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); 
    }
    
    function getSortedDates() {
        return [...new Set(state.allMatches.map(m => m.date))].sort((a,b) => {
            const pA = a.split('.').map(Number); const pB = b.split('.').map(Number);
            return new Date(pA[2], pA[1]-1, pA[0]) - new Date(pB[2], pB[1]-1, pB[0]);
        });
    }

    window.onload = () => { 
        setDailyQuote();
        startLiveClock(); 
        fetchData(); 
        makeScrollable('status-tabs'); 
        makeScrollable('date-tabs'); 
        makeScrollable('alphabet-index'); 
    };
    setInterval(updateUI, 60000);
</script>
</body>
</html>
