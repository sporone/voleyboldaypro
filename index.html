<script>
    // 1. KONFİGÜRASYON VE SABİTLER
    const REGIONS = {
        istanbul: { name: "TVF İSTANBUL", matches: 'https://docs.google.com/spreadsheets/d/1czqD3fVZD-P8zuefoikXfIisTmqSbSxN-4YXiibxkic/export?format=csv&gid=0', adText: "İSTANBUL REKLAM 1" },
        kocaeli: { name: "TVF KOCAELİ", matches: 'https://docs.google.com/spreadsheets/d/1VkQ0KW4gRmc21O7R9CHb-nj5Cedajr1-ZosP09Y0CVY/export?format=csv&gid=0', adText: "KOCAELİ REKLAM 1" },
        ankara: { name: "TVF ANKARA", matches: 'https://docs.google.com/spreadsheets/d/1VkQ0KW4gRmc21O7R9CHb-nj5Cedajr1-ZosP09Y0CVY/export?format=csv&gid=0', adText: "ANKARA REKLAM 1" }
    };

    // SADECE YENİ LİNK KULLANILIYOR
    const LOGO_DATA_SOURCE = 'https://docs.google.com/spreadsheets/d/1tze95HAdE5QzRbag--RnpzDQPlLBqHZlARJ8TuBp5Fw/export?format=csv&gid=0';

    const MOTIVATION_QUOTES = [
        "Başarı, hazırlık ve fırsatın buluştuğu yerdir.",
        "Sahadaki en büyük yetenek, asla pes etmeme yeteneğidir.",
        "Ter dökmeden dökülen gözyaşı, zafer getirmez.",
        "Şampiyonlar salonlarda yapılmaz. Şampiyonlar içlerindeki tutkuyla oluşur.",
        "Bir takımın gücü, her bir üyesidir. Her bir üyenin gücü ise takımdır.",
        "Maç sahada kazanılmadan önce zihinde kazanılır."
    ];

    let state = { 
        allMatches: [], 
        logos: {}, // SADECE Google Sheets'ten dolacak
        currentDate: "", 
        selectedStatus: "all", 
        searchQuery: "", 
        selectedAlphabet: null, 
        selectedTeam: null, 
        selectedRegion: "istanbul", 
        currentSharingMatch: null 
    };

    // --- LOGO NORMALİZASYON VE KÖK İSİM BULMA (A-B-C-D KURALI) ---
    function normalizeForLogo(s) { 
        if (!s) return ""; 
        let n = s.toString().trim().toLocaleLowerCase('tr-TR');
        // 1: Başındaki (H) ve boşlukları temizle
        n = n.replace(/^\(h\)\s*[-–—]?\s*/i, '');
        // 2: SADECE ARAMA İÇİN takıları, noktalama ve boşlukları temizle
        return n.replace(/[\.\,\-\(\)\s]/g, '')
            .replace(/(sk|s\.k|spor|kulübü|derneği|gençlik|voleybol|belediye|bld|belediyespor|akademi|okulları|voleybolakademi|aslan|kartal|aslanları|üniversitesi|üniversite|universitesi|universite)$/gi, ''); 
    }

    function cleanTeamName(s) { return s ? s.toString().replace(/^\(H\)\s*[-–—]?\s*/i, '').trim() : ""; }
    
    // KÖK İSİM: Takım isminin sonundaki A, B, C, D gibi harfleri temizler ve asıl kulübü bulur
    function getCoreName(s) { 
        let n = cleanTeamName(s);
        return n.replace(/\s+[a-zA-Z]$/, '').trim(); 
    }

    function getLogoHtml(teamName, classes = "w-9 h-9") {
        if (!teamName) return "";
        // Kök ismi buluruz ("Dev Ataşehir B" -> "Dev Ataşehir" olarak aranır)
        const coreName = getCoreName(teamName);
        const normTeam = normalizeForLogo(coreName); 
        let rawUrl = null;
        let finalUrl = null;
        
        const keys = Object.keys(state.logos);
        
        // Sadece Tam Kök Eşleşmesi (Üniversitelerin logolarının karışmasını tamamen engeller)
        for (const k of keys) {
            if (normTeam === normalizeForLogo(k)) { 
                rawUrl = state.logos[k]; 
                break; 
            }
        }

        // GOOGLE DRIVE VE DİĞER LİNKLERİ DOĞRU ÇEVİRME
        if (rawUrl) {
            if (rawUrl.includes('drive.google.com')) {
                finalUrl = rawUrl; 
            } else if (rawUrl.includes('instagram') || rawUrl.includes('fbcdn') || rawUrl.includes('fbcdn.net') || rawUrl.includes('scontent')) {
                finalUrl = `https://wsrv.nl/?url=${encodeURIComponent(rawUrl)}&w=150&h=150&fit=contain&output=webp`;
            } else {
                finalUrl = rawUrl;
            }
        }
        
        const initial = coreName.substring(0, 2).toUpperCase() || "VO";
        return `<div class="team-logo-circle ${classes} border shadow-sm relative shrink-0 overflow-hidden">
            <span class="fallback-text">${initial}</span>
            ${finalUrl ? `<img src="${finalUrl}" loading="lazy" class="relative z-10" referrerpolicy="no-referrer" onerror="this.parentElement.querySelector('.fallback-text').style.display='flex'; this.style.display='none'">` : ''}
        </div>`;
    }

    // --- KUSURSUZ CSV AYRIŞTIRICI ---
    function parseCSVLine(str) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < str.length; i++) {
            const char = str[i];
            if (char === '"') {
                if (inQuotes && str[i+1] === '"') { current += '"'; i++; } else { inQuotes = !inQuotes; }
            } else if (char === ',' && !inQuotes) {
                result.push(current);
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current);
        return result;
    }

    async function fetchLogos() {
        try {
            // Google Sheets önbelleğini yenmek için rastgele parametre ekliyoruz
            const r = await fetch(`${LOGO_DATA_SOURCE}&cb=${Date.now()}`, { cache: 'no-store' });
            const csvText = await r.text();
            
            if(csvText.toLowerCase().includes('<!doctype html>')) {
                console.error("Logo Excel dosyası 'Herkese Açık' değil veya link hatalı.");
                return;
            }

            csvText.split(/\r?\n/).slice(1).forEach(line => {
                const parts = parseCSVLine(line);
                if (parts.length >= 2 && parts[0] && parts[1]) {
                    const teamName = parts[0].trim();
                    let logoUrl = parts[1].trim();
                    
                    logoUrl = logoUrl.replace(/^"|"$/g, '');

                    // Google Drive paylaşım linki düzeltici (TÜM VERSİYONLAR)
                    let fileId = null;
                    if (logoUrl.includes('drive.google.com/file/d/')) {
                        const match = logoUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
                        if (match) fileId = match[1];
                    } else if (logoUrl.includes('drive.google.com/open?id=')) {
                        const match = logoUrl.match(/id=([a-zA-Z0-9_-]+)/);
                        if (match) fileId = match[1];
                    } else if (logoUrl.includes('drive.google.com/uc?id=')) {
                        const match = logoUrl.match(/id=([a-zA-Z0-9_-]+)/);
                        if (match) fileId = match[1];
                    }

                    // Eğer Drive ID bulunduysa onu Google Thumbnail API'sine dönüştür
                    if (fileId) {
                        logoUrl = `https://drive.google.com/thumbnail?id=${fileId}&sz=w400`;
                    }

                    if(logoUrl.startsWith('http')) {
                        state.logos[teamName] = logoUrl;
                    }
                }
            });
            console.log("Logolar Excel'den başarıyla yüklendi. Toplam:", Object.keys(state.logos).length);
        } catch (e) { console.error("Logolar çekilemedi:", e); }
    }

    // --- GENEL YARDIMCI FONKSİYONLAR ---
    function cleanTeamName(s) { return s ? s.toString().replace(/^\(H\)\s*[-–—]?\s*/i, '').trim() : ""; }
    function getTurkeyTime() { const now = new Date(); return new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (10800000)); }
    function getTodayString() { const tr = getTurkeyTime(); return `${String(tr.getDate()).padStart(2, '0')}.${String(tr.getMonth() + 1).padStart(2, '0')}.${tr.getFullYear()}`; }
    function isMatchPlayed(m) { return (m.s1 !== '-' && m.s1 !== '') || (m.s2 !== '-' && m.s2 !== ''); }
    function timeToMins(t) { const p = (t || "00:00").split(':'); return (parseInt(p[0]) || 0) * 60 + (parseInt(p[1]) || 0); }
    function dateToValue(d) { if(!d) return 0; const p = d.split('.').map(Number); return new Date(p[2], p[1]-1, p[0]).getTime(); }

    function isMatchDelayedOrMissing(m) {
        if (isMatchPlayed(m)) return false;
        const todayVal = dateToValue(getTodayString()), mVal = dateToValue(m.date);
        if (mVal < todayVal) return true;
        if (mVal === todayVal) { if (getTurkeyTime().getHours() * 60 + getTurkeyTime().getMinutes() >= timeToMins(m.time) + 120) return true; }
        return false;
    }

    function checkLiveStatus(m) {
        if (isMatchPlayed(m) || isMatchDelayedOrMissing(m)) return false;
        if (m.date === getTodayString()) { if (getTurkeyTime().getHours() * 60 + getTurkeyTime().getMinutes() >= timeToMins(m.time)) return true; }
        return false;
    }

    // --- ACTIONS VE RENDER ---
    function startLiveClock() {
        const tEl = document.getElementById('live-time'), dEl = document.getElementById('live-date');
        function update() {
            const tr = getTurkeyTime();
            if(tEl) tEl.innerText = `${String(tr.getHours()).padStart(2, '0')}:${String(tr.getMinutes()).padStart(2, '0')}`;
            const ds = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'], ms = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
            if(dEl) dEl.innerText = `${tr.getDate()} ${ms[tr.getMonth()]} ${ds[tr.getDay()]}`;
        }
        update(); setInterval(update, 30000);
    }

    function setDailyQuote() {
        const day = Math.floor((getTurkeyTime() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
        const el = document.getElementById('daily-quote-text'); if(el) el.innerText = MOTIVATION_QUOTES[day % MOTIVATION_QUOTES.length];

    function setRegion(regionKey) {
        if (!REGIONS[regionKey]) return;
        state.selectedRegion = regionKey; state.selectedTeam = null; state.currentDate = ""; state.searchQuery = "";
        document.querySelectorAll('.region-btn').forEach(b => b.className = "region-btn px-6 py-2.5 rounded-xl text-[10px] font-black uppercase border border-slate-200 bg-white text-slate-500 hover:border-indigo-300 transition-all shrink-0 shadow-sm");

    async function fetchData() {
        try {
            document.getElementById('loading-overlay').classList.remove('hidden');
            // Logoları sadece ilk açılışta veya boşsa Sheets'ten çek
            if (Object.keys(state.logos).length === 0) await fetchLogos();
            
            // Kocaeli verilerinin hızlı güncellenmesi için cache: 'no-store' eklendi
            const r = await fetch(`${REGIONS[state.selectedRegion].matches}${REGIONS[state.selectedRegion].matches.includes('?') ? '&' : '?'}cb=${Date.now()}`, { cache: 'no-store' });
            
            state.allMatches = parseMatches(await r.text());
            const ds = getSortedDates(), td = getTodayString();
            if (ds.length > 0) state.currentDate = ds.includes(td) ? td : ds[0];
            document.getElementById('loading-overlay').classList.add('hidden');
            updateUI();
        } catch (error) { document.getElementById('loading-overlay').classList.add('hidden'); }
    }

    function parseMatches(csv) {
        return csv.split(/\r?\n/).slice(1).map(line => {
            const p = parseCSVLine(line);
            return { date: (p[0]||"").trim(), venue: (p[1]||"").trim(), time: (p[2]||"").trim(), t1: (p[3]||"").trim(), s1: (p[4]||"").trim()||"-", s2: (p[5]||"").trim()||"-", t2: (p[6]||"").trim(), sets: (p[7]||"").trim(), league: (p[10]||"LİG").trim(), kume: (p[10]||""), tur: (p[12]||""), gr: (p[13]||""), c: (p[9]||""), ktg: (p[11]||"") };
        }).filter(m => !(m.time + m.sets + m.t1 + m.t2).toLocaleLowerCase('tr-TR').includes('iptal'));
    }

        const sD = document.getElementById('selected-team-display'), pW = document.getElementById('playing-teams-wrapper'), dW = document.getElementById('date-tabs-wrapper');

    function parseSetScoresHtml(sets) {
        let r1 = '', r2 = '', ms = sets ? [...sets.matchAll(/\((\d+)-(\d+)\)/g)] : [];
        for (let i = 0; i < 5; i++) {
            if (i < ms.length) {
                const v1 = parseInt(ms[i][1]), v2 = parseInt(ms[i][2]);
                r1 += `<span class="w-5 sm:w-6 text-center h-8 sm:h-9 flex items-center justify-center ${v1 > v2 ? 'text-rose-600' : 'text-slate-400'}">${v1}</span>`;
                r2 += `<span class="w-5 sm:w-6 text-center h-8 sm:h-9 flex items-center justify-center ${v2 > v1 ? 'text-rose-600' : 'text-slate-400'}">${v2}</span>`;
            } else { r1 += `<span class="w-5 sm:w-6 text-center h-8 sm:h-9 flex items-center justify-center text-slate-200">-</span>`; r2 += `<span class="w-5 sm:w-6 text-center h-8 sm:h-9 flex items-center justify-center text-slate-200">-</span>`; }
        }
        return { row1: `<div class="flex gap-1 sm:gap-1.5 items-center leading-none">${r1}</div>`, row2: `<div class="flex gap-1 sm:gap-1.5 items-center leading-none">${r2}</div>` };

    function renderMatches() {
        const container = document.getElementById('match-container'); container.innerHTML = '';
        let matches = [];
        if (state.selectedTeam) {
            // Seçili takım (kulüp kök adı) bazında tüm A-B-C maçlarını getirir
            const selCore = getCoreName(state.selectedTeam).toLocaleLowerCase('tr-TR');
            matches = state.allMatches.filter(m => 
                getCoreName(m.t1).toLocaleLowerCase('tr-TR') === selCore || 
                getCoreName(m.t2).toLocaleLowerCase('tr-TR') === selCore
            );
        } else {
            matches = state.allMatches.filter(m => m.date === state.currentDate);
            if (state.selectedStatus === 'played') matches = matches.filter(isMatchPlayed);
            else if (state.selectedStatus === 'pending') matches = matches.filter(m => !isMatchPlayed(m) && !checkLiveStatus(m) && !isMatchDelayedOrMissing(m));
            else if (state.selectedStatus === 'delayed') matches = matches.filter(isMatchDelayedOrMissing);
            if (state.searchQuery) { 
                const q = state.searchQuery.toLocaleLowerCase('tr-TR').trim(); 
                matches = matches.filter(m => m.t1.toLocaleLowerCase('tr-TR').includes(q) || m.t2.toLocaleLowerCase('tr-TR').includes(q) || m.venue.toLocaleLowerCase('tr-TR').includes(q)); 
            }
        }
        document.getElementById('match-count-badge').innerText = matches.length;
        if (!matches.length) document.getElementById('empty-state').classList.replace('hidden', 'flex');
        else {
            document.getElementById('empty-state').classList.replace('flex', 'hidden');
            const live = matches.filter(checkLiveStatus), pending = matches.filter(m => !isMatchPlayed(m) && !checkLiveStatus(m) && !isMatchDelayedOrMissing(m)), played = matches.filter(isMatchPlayed), delayed = matches.filter(isMatchDelayedOrMissing);
            const h2Class = "text-indigo-950 font-black text-xl sm:text-2xl tracking-tighter uppercase border-b border-slate-100 pb-3 mb-4";
            if (live.length) { container.insertAdjacentHTML('beforeend', `<h2 class="text-rose-600 font-black text-xl sm:text-2xl tracking-tighter uppercase border-b border-rose-100 pb-3 mb-4">CANLI MAÇLAR</h2>`); live.forEach((m,i) => container.insertAdjacentHTML('beforeend', createMatchCard(m, i))); }
            if (pending.length) { container.insertAdjacentHTML('beforeend', `<h2 class="${h2Class} ${live.length?'mt-10':''}">GELECEK MAÇLAR</h2>`); pending.forEach((m,i) => container.insertAdjacentHTML('beforeend', createMatchCard(m, i))); }
            if (played.length) { container.insertAdjacentHTML('beforeend', `<h2 class="text-slate-500 font-black text-xl sm:text-2xl tracking-tighter uppercase border-b border-slate-100 pb-3 mb-4 mt-10">BİTEN MAÇLAR</h2>`); played.forEach((m,i) => container.insertAdjacentHTML('beforeend', createMatchCard(m, i))); }
            if (delayed.length) { container.insertAdjacentHTML('beforeend', `<h2 class="text-amber-600 font-black text-xl sm:text-2xl tracking-tighter uppercase border-b border-amber-100 pb-3 mb-4 mt-10">ERTELENEN / SKOR BEKLENEN</h2>`); delayed.forEach((m,i) => container.insertAdjacentHTML('beforeend', createMatchCard(m, i))); }
        }
    }

    function selectTeam(t) { state.selectedTeam = t; state.searchQuery = t; updateUI(); }
    function clearSelectedTeam() { state.selectedTeam = null; state.searchQuery = ""; updateUI(); }
    
    function handleSearch(v) { 
        state.searchQuery = v; 
        if (v && state.selectedTeam && getCoreName(v).toLocaleLowerCase('tr-TR') !== getCoreName(state.selectedTeam).toLocaleLowerCase('tr-TR')) {
            state.selectedTeam = null; 
        }
        updateUI(); 
    }
    
    function setStatusFilter(s) { state.selectedStatus = s; document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active')); document.getElementById(`filter-${s}`).classList.add('active'); updateUI(); }
    function isPlaceholderTeam(s) { return !s || s.toLowerCase().includes(".si") || s.toLowerCase().includes("galibi"); }
    function getSortedDates() { return [...new Set(state.allMatches.map(m => m.date).filter(d => d))].sort((a,b) => dateToValue(a) - dateToValue(b)); }
    
    function calculateTeamStats(n) {
        // İstatistikleri ana kulüp bazında toplar (A, B tüm takımlar dahil edilir)
        const selCore = getCoreName(n).toLocaleLowerCase('tr-TR');
        let p=0, w=0, l=0, d=0, pen=0;
        state.allMatches.forEach(m => {
            const t1Core = getCoreName(m.t1).toLocaleLowerCase('tr-TR');
            const t2Core = getCoreName(m.t2).toLocaleLowerCase('tr-TR');
            
            const match1 = (t1Core === selCore);
            const match2 = (t2Core === selCore);

            if (match1 || match2) { 
                if (isMatchPlayed(m)) { 
                    const s1=parseInt(m.s1), s2=parseInt(m.s2); 
                    if (match1) { p++; if(s1>s2) w++; else l++; } 
                    if (match2) { p++; if(s2>s1) w++; else l++; } 
                } else { 
                    if (isMatchDelayedOrMissing(m)) {
                        if(match1) d++; if(match2) d++;
                    } else { 
                        if(match1) pen++; if(match2) pen++;
                    } 
                } 
            }
        });
        return { played: p, wins: w, losses: l, delayed: d, pending: pen };
    }
    
    function showError(m) { const t = document.createElement('div'); t.className = "fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl z-[200] font-bold text-sm text-center"; t.innerText = m; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }

    function openWhatsappModal(mStr) {
        const m = JSON.parse(decodeURIComponent(mStr)); state.currentSharingMatch = m;
        document.getElementById('whatsapp-modal').style.display = 'flex';
        document.getElementById('whatsapp-modal-match-info').innerHTML = `<div class="flex flex-col items-center gap-2 w-1/3">${getLogoHtml(m.t1, "w-11 h-11 sm:w-12 sm:h-12")} <span class="text-[10px] font-bold text-center uppercase">${m.t1}</span></div><div class="flex flex-col items-center justify-center w-1/3"><span class="text-xl font-black text-indigo-950 uppercase leading-none text-center">${isMatchPlayed(m) ? m.s1+"-"+m.s2 : "VS"}</span></div><div class="flex flex-col items-center gap-2 w-1/3">${getLogoHtml(m.t2, "w-11 h-11 sm:w-12 sm:h-12")} <span class="text-[10px] font-bold text-center uppercase">${m.t2}</span></div>`;
        if (!isMatchPlayed(m)) { document.getElementById('whatsapp-roster-section').classList.replace('hidden', 'flex'); initRosterForm(); } else document.getElementById('whatsapp-roster-section').classList.replace('flex', 'hidden');
    }
    function closeWhatsappModal() { document.getElementById('whatsapp-modal').style.display = 'none'; }
    function initRosterForm() {
        const l = document.getElementById('players-list'); if (l.children.length > 0) return;
        let ns = '<option value="">No</option>'; for(let n=1; n<=99; n++) { let s = n<10 ? '0'+n : n.toString(); ns += `<option value="${s}">${s}</option>`; }
        let h = ''; for(let i=1; i<=18; i++) {
            h += `<div class="flex flex-row items-center gap-1.5 w-full mb-1.5"><span class="text-[11px] font-black text-slate-400 w-4 text-right shrink-0">${i}.</span><select id="p-num-${i}" class="bg-white border border-slate-200 rounded-lg p-2 text-[10px] font-bold text-slate-700 outline-none w-[52px] shrink-0 text-center">${ns}</select><input type="text" id="p-name-${i}" placeholder="Sporcu Adı" class="flex-1 min-w-0 bg-white border border-slate-200 rounded-lg p-2 text-[10px] font-bold text-slate-800 outline-none"><select id="p-pos-${i}" class="bg-white border border-slate-200 rounded-lg p-2 text-[10px] font-bold text-slate-700 outline-none w-[85px] shrink-0"><option value="">Mevki</option><option value="Pasör">Pasör</option><option value="Orta">Orta</option><option value="Smaçör">Smaçör</option><option value="Libero">Libero</option></select></div>`;
        }
        l.innerHTML = h;
    }
    document.getElementById('whatsapp-send-btn').onclick = () => {
        const m = state.currentSharingMatch; if(!m) return;
        const note = document.getElementById('whatsapp-note').value.trim();
        const cat = (m.kume + " " + m.tur + " " + m.gr).trim() || m.league;
        let msg = `*${isMatchPlayed(m) ? 'MAÇ SONUCU' : 'MAÇ GÜNÜ'}*\n🏆 Kategori: ${cat}\n\n`;
        if(note) msg += `📝 ${note}\n\n`;
        if (isMatchPlayed(m)) msg += `🏐 *${m.t1}* : ${m.s1}\n🏐 *${m.t2}* : ${m.s2}\n\n*Setler:*\n${m.sets.replace(/<[^>]*>/g, '')}\n`;
        else msg += `🏐 *${m.t1}*\n🆚\n🏐 *${m.t2}*\n\n⏰ Saat: ${m.time}\n`;
        msg += `📍 Salon: ${m.venue}\n📅 Tarih: ${m.date}\n\n`;
        if (!isMatchPlayed(m)) {
            const coach = document.getElementById('coach-name').value; if(coach) msg += `*Antrenör:* ${coach}\n`;
            const serve = document.getElementById('team-serve-status').value; if(serve) msg += `*Servis:* ${serve}\n`;
            const mt = document.getElementById('meeting-time').value, ml = document.getElementById('meeting-location').value;
            if(mt || ml) msg += `\n*Toplanma:*\n${mt ? '⏰ Saat: '+mt+'\n' : ''}${ml ? '📍 Yer: '+ml+'\n' : ''}`;
            let pL = ''; for(let i=1; i<=18; i++){ const n = document.getElementById(`p-num-${i}`).value, nm = document.getElementById(`p-name-${i}`).value, ps = document.getElementById(`p-pos-${i}`).value; if(nm) pL += `${i}. #${n} ${nm} - ${ps}\n`; }
            if(pL) msg += `\n*Kadro:*\n${pL}`;
        }
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
        closeWhatsappModal();
    };

    function makeScrollable(id) {
        const el = document.getElementById(id); if(!el) return;
        let isDown = false, startX, scrollLeft;
        el.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - el.offsetLeft; scrollLeft = el.scrollLeft; });
        el.addEventListener('mouseleave', () => isDown = false);
        el.addEventListener('mouseup', () => isDown = false);
        el.addEventListener('mousemove', (e) => { if(!isDown) return; e.preventDefault(); const x = e.pageX - el.offsetLeft; const walk = (x - startX) * 2; el.scrollLeft = scrollLeft - walk; });
    }

    window.onload = () => { 
        startLiveClock(); setDailyQuote(); setRegion('istanbul');
        ['status-tabs', 'date-tabs', 'alphabet-index', 'region-tabs', 'top-logos-container'].forEach(makeScrollable);
    };
</script>
</body>
</html>
